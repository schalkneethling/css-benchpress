name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Configure Vite+
        run: bun run vp config

      - name: Check source
        run: bun run check

      - name: Run tests
        run: bun run test

  build:
    name: Pack package
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Configure Vite+
        run: bun run vp config

      - name: Build package
        run: bun run build

      - name: Check package
        run: bun run package:check

      - name: Create package directory
        run: mkdir package

      - name: Create package tarball
        run: bun pm pack --destination package --ignore-scripts

      - name: Upload package tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: package/*.tgz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.8.0
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Ensure npm is new enough for trusted publishing
        run: |
          required="11.5.1"
          current="$(npm --version)"
          if npx -y semver -r "<$required" --include-prerelease "$current" > /dev/null 2>&1; then
            echo "npm $current is below $required; upgrading."
            npm install -g "npm@$required"
          fi
          npm --version

      - name: Download package tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: package

      - name: Publish to npm
        run: |
          tarball="$(find package -type f -name '*.tgz' -print -quit)"

          if [ -z "$tarball" ]; then
            echo "No package tarball found in downloaded artifact."
            find package -maxdepth 3 -type f -print
            exit 1
          fi

          npm publish "$(realpath "$tarball")" --ignore-scripts --access public
